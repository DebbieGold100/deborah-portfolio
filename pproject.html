<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGNUP</title>
</head>
<style>
    body{
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: rgb(12, 12, 12);
        font-family: Arial, sans-serif;
    }
    .box1{
        position:absolute;
        left:100px;
        height:500px;
        width:1000px;
        background:linear-gradient(90deg,rgb(128, 10, 69), #fc0298);
      box-shadow:0 0 25px rgba(245, 6, 141, 0.30),
      inset 0 0 25px rgba(244, 6, 125, 0.45);
    }
    .box2{  
        position:absolute;
        background:black;
        color:white;
        right:260px;
        height:480px;
        width:600px;
clip-path: polygon(50% 0%, 100% 0%, 100% 100%, 0 100%);
    
    }
    .input-field{
        width:80%;
        padding:5px;
        margin:10px ;
       border:none;
        border-radius:5px;
        background:transparent;
        border-bottom: 1px solid #fc0298;
        color:white;
    }
    .box1 h2{
        color:white;
        margin-top:100px;
        font-size:35px;
        padding-left:30px;
    }
    .box1 p{
        color:white;
        font-size:20px;
        padding-left:35px;  
    }
    .box2 h2{
        position:absolute;
        top:20px;
        font-size:30px;
        right:120px;
    }
    .box2 form{
        position:absolute;
        display:flex;
        flex-direction:column;
        right:5px;
        top:110px;
        width:350px;
        height:20px;   
    }
    .register{
        width:220px;
         background:linear-gradient(135deg,rgb(128, 10, 69), #fc0298);
        margin-top:-17px;
       height:60px;
       padding-bottom: 10px;
       padding-right:30px;
       margin-left:45px;
       text-align:center;
       padding-top:10px;
       border:none;
       border-radius:50px;
       font-size: 15px;
       color:white;  
    }
    .register:hover{
        background:#fd0a4f;
        cursor:pointer;
    }
      .signin{  
        position:absolute; 
        margin-top:430px;
        margin-right:-350px;
        z-index: 2;
         color:white;
    }
    .signin a{
        color:#fc0298;
        text-decoration:none;
        font-weight: bold;
        margin-left:5px;
    }
</style>
<body>
       <div class="box1">
    <h2>NEW<br> HERE?</h2>
    <p>Sign up,<br> join our community <br>today and discover great<br>
 opportunities!, personalized<br> content
  and much more,<br>start your journey with us now.</p>
       </div>
   <div class="box2">
    <h2>Register</h2>
    <form action="project.html" method="post">
        <label>Username</label>
 <input type="text" class="input-field" required><br><br>
 <label>Email</label>
<input type="email" class="input-field" required><br><br>
<label>password</label>
<input type="password" class="input-field" required><br><br>
<button type="submit" class="register">Register</button>
</form>
 </div>  
<div class="signin">Already have an account?<a href="sign">Sign in</a></div>
  
</body>
</html>
